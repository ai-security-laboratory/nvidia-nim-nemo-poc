apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgvector
  namespace: retailbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgvector
  template:
    metadata:
      labels:
        app: pgvector
    spec:
      containers:
      - name: pgvector
        image: pgvector/pgvector:pg16
        env:
        - name: POSTGRES_DB
          value: retailbot
        - name: POSTGRES_USER
          value: retailbot
        - name: POSTGRES_PASSWORD
          value: retailbot_secret
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: pgdata
        emptyDir: {}   # replace with PVC in production
---
apiVersion: v1
kind: Service
metadata:
  name: pgvector
  namespace: retailbot
spec:
  selector:
    app: pgvector
  ports:
  - port: 5432
    targetPort: 5432
