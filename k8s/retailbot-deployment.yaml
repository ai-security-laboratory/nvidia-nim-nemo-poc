apiVersion: apps/v1
kind: Deployment
metadata:
  name: retailbot
  namespace: retailbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retailbot
  template:
    metadata:
      labels:
        app: retailbot
    spec:
      initContainers:
      - name: install-deps
        image: python:3.11-slim
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          echo "==> Installing system build tools..."
          apt-get update -qq && apt-get install -y --no-install-recommends \
            g++ gcc make build-essential libpq-dev -qq

          echo "==> Creating dirs..."
          mkdir -p /app/guardrails/colang /app/site-packages

          echo "==> Copying guardrails config..."
          cp /guardrails-config/* /app/guardrails/colang/

          echo "==> Installing Python packages into /app/site-packages..."
          pip install --upgrade pip -q
          pip install \
            fastapi \
            "uvicorn[standard]" \
            "nemoguardrails==0.10.1" \
            "semantic-kernel>=1.0.0" \
            openai \
            httpx \
            psycopg2-binary \
            pgvector \
            fastembed \
            --target /app/site-packages \
            --no-cache-dir \
            -q

          echo "==> Init done."
        volumeMounts:
        - name: guardrails-vol
          mountPath: /guardrails-config
        - name: app-dir
          mountPath: /app

      containers:
      - name: retailbot
        image: python:3.11-slim
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          export PYTHONPATH=/app/site-packages:$PYTHONPATH
          echo "==> Starting RetailBot..."
          python /retailbot_app.py
        env:
        - name: NIM_BASE_URL
          value: "http://nim-llm.nim.svc.cluster.local:8000/v1"
        - name: NIM_MODEL
          value: "meta/llama-3.1-8b-instruct"
        - name: PG_CONN
          value: "postgresql://retailbot:retailbot_secret@pgvector:5432/retailbot"
        - name: ORDER_API_URL
          value: "http://mock-order-api:8001"
        - name: CRM_URL
          value: "http://mock-crm:8002"
        - name: ERP_URL
          value: "http://mock-erp:8003"
        - name: LOGISTICS_URL
          value: "http://mock-logistics:8004"
        - name: PYTHONPATH
          value: "/app/site-packages"
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: app-dir
          mountPath: /app
        - name: app-code
          mountPath: /retailbot_app.py
          subPath: retailbot_app.py
        - name: sk-agent-code
          mountPath: /sk_agent.py
          subPath: sk_agent.py

      volumes:
      - name: guardrails-vol
        configMap:
          name: guardrails-config
      - name: app-dir
        emptyDir: {}
      - name: app-code
        configMap:
          name: retailbot-app-code
      - name: sk-agent-code
        configMap:
          name: sk-agent-code
---
apiVersion: v1
kind: Service
metadata:
  name: retailbot
  namespace: retailbot
spec:
  type: NodePort
  selector:
    app: retailbot
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
