# Falco rules — RetailBot AI Agent Attack Detection
#
# Deploy on the VM:
#   sudo cp falco_rules.yaml /etc/falco/rules.d/retailbot_rules.yaml
#   sudo systemctl reload falco
#
# Or with microk8s Falco DaemonSet:
#   kubectl create configmap falco-retailbot-rules \
#     --from-file=falco_rules.yaml -n falco

# ---------------------------------------------------------------------------
# Rule 1 — THE KEY DETECTION: Agent disabled its own guardrails
# ---------------------------------------------------------------------------

- rule: AI Agent Guardrails Disabled
  desc: >
    The RetailBot AI agent wrote the guardrails disabled flag file.
    This indicates a successful prompt injection attack that caused the agent
    to disable its own NeMo Guardrails safety filters (MITRE T1562.001).
  condition: >
    (open_write or file_create) and
    container.name = "retailbot" and
    fd.name = "/app/guardrails/disabled"
  output: >
    CRITICAL Guardrails disabled by AI agent — prompt injection suspected
    (proc=%proc.name file=%fd.name user=%user.name
    pod=%k8s.pod.name ns=%k8s.ns.name container=%container.name)
  priority: CRITICAL
  tags: [container, file, ai_security, defense_evasion, T1562, prompt_injection]

# ---------------------------------------------------------------------------
# Rule 2 — Any write to the guardrails config directory
# ---------------------------------------------------------------------------

- rule: Guardrails Config Directory Modified
  desc: >
    A file was written inside the RetailBot guardrails config directory.
    The Colang files and NeMo config should never be modified at runtime.
  condition: >
    open_write and
    container.name = "retailbot" and
    fd.name startswith "/app/guardrails/"
  output: >
    WARNING Guardrails config directory modified at runtime
    (proc=%proc.name file=%fd.name user=%user.name
    pod=%k8s.pod.name ns=%k8s.ns.name)
  priority: WARNING
  tags: [container, file, ai_security, defense_evasion, T1562]

# ---------------------------------------------------------------------------
# Rule 3 — Bulk outbound connections to backend services (data enumeration)
# ---------------------------------------------------------------------------

- rule: Retailbot Bulk Backend Enumeration
  desc: >
    The RetailBot pod is making an unusual number of rapid connections to
    internal backend services (CRM port 8002, ERP port 8003).
    May indicate data enumeration following a guardrail bypass.
  condition: >
    outbound and
    container.name = "retailbot" and
    fd.sport in (8002, 8003, 8004)
  output: >
    INFO Outbound connection from RetailBot to backend service
    (proc=%proc.name dst=%fd.rip:%fd.rport pod=%k8s.pod.name ns=%k8s.ns.name)
  priority: NOTICE
  tags: [container, network, ai_security, collection, T1213]
